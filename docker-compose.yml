version: '3.8'

services:
  # Development server with webpack-dev-server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfwcosmo-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "443:443"
    command: npm run dev
    environment:
      - NODE_ENV=development
    networks:
      - tfwcosmo-net

  # Production nginx server
#  nginx:
#    image: nginx:alpine
