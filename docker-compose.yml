#    ports:
#      - "80:80"
#      - "443:443"
#    volumes:
#      - ./dist:/usr/share/nginx/html:ro
#      - ./nginx.conf:/etc/nginx/nginx.conf:ro
#    restart: unless-stopped
#    networks:
#      - tfwcosmo-net

networks:
  tfwcosmo-net:
    driver: bridge
