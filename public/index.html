<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Миры Двуликого</title>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- Timeline panel -->
  <div id="timeline-panel">
    <div class="timeline-controls">
      <button id="play-pause-btn" class="rune-btn" title="Pause/Play">▶</button>
      <div class="slider-group">
        <div class="slider-row">
          <input type="range" id="time-slider" min="0" max="1000" value="0" step="1">
          <span id="time-display">0</span>
        </div>
        <div class="time-scale-info-inline placeholder"></div>
      </div>
      <div class="slider-group">
        <div class="slider-row">
          <input type="range" id="speed-slider" min="1" max="336" value="1" step="1">
          <span id="speed-display">x1</span>
        </div>
        <div class="time-scale-info-inline">1 сек = <span id="time-scale-value">1</span> <span id="time-scale-unit">час</span></div>
      </div>
      <button id="toggle-orbits-btn" class="rune-btn" title="Toggle Orbits">⊕</button>
    </div>
  </div>

  <!-- Info panel -->
  <div id="info-panel" class="info-panel hidden">
    <button id="close-info-btn" class="rune-btn close-btn">✕</button>
    <div class="info-content">
      <h2 id="info-title"></h2>
      <div id="info-details"></div>
      <p id="info-description"></p>
    </div>
  </div>

  <!-- Legend -->
  <div id="legend-panel">
    <div class="legend-item">
      <span class="legend-star yellow"></span> Жёлтое солнце
    </div>
    <div class="legend-item">
      <span class="legend-star red"></span> Красное солнце
    </div>
    <div class="legend-item">
      <span class="legend-planet"></span> Планеты
    </div>
    <div class="legend-item">
      <span class="legend-moon"></span> Спутники
    </div>
  </div>
</body>
</html>
